name: secret-scan
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Defense-in-depth: a clone without the local pre-commit hook still cannot land
  # a secret on a branch — CI re-scans the FULL history on every push/PR.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
